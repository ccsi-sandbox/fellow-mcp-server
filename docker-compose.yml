services:
  fellow-mcp:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=${TZ:-America/Los_Angeles}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      docker_vlan30:
        ipv4_address: 192.168.250.72  # Replace with your desired IP

networks:
    docker_vlan30:
          external: true

